# Render Blueprint — déploiement THE PILOT (région EU Frankfurt).
# Les SECRETS ne sont PAS dans ce fichier : ils se règlent dans le dashboard Render
# (envVars en `sync: false` = Render te demande la valeur, jamais commitée).
#
# Mise en place : Render → New → Blueprint → connecter le repo GitHub → il lit ce fichier.
services:
  - type: web
    name: the-pilot
    runtime: node
    region: frankfurt # Union Européenne (RGPD)
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /login
    envVars:
      # Force la prod : l'auth est TOUJOURS active (DISABLE_AUTH sans effet ici).
      - key: NODE_ENV
        value: production
      # --- Secrets à renseigner dans le dashboard Render (jamais commités) ---
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_TEST_MODE
        sync: false
      - key: EMAIL_TEST_ADDRESS
        sync: false
      - key: EMAIL_SENDER_NAME
        sync: false
      - key: EMAIL_SENDER_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_EMAIL_LOGO_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_GROK_MODEL
        sync: false
      - key: OPENROUTER_IMAGE_MODEL
        sync: false
      # Réplique lecture seule SAH (connexion seulement depuis les IP dédiées Render)
      - key: SAH_DATABASE_URL
        sync: false
      # Secret partagé avec le cron de synchro (protège /api/cron/sah-sync)
      - key: CRON_SECRET
        sync: false

  # --- Cron 1 : profils + statuts d'inscription, toutes les 15 minutes ---
  # Le cron NE touche PAS SAH : il appelle l'app web (qui a les IP whitelistées).
  # SYNC_URL à renseigner dans le dashboard Render (scope=light = projets + investisseurs) :
  #   https://<domaine-de-l-app>/api/cron/sah-sync?token=<CRON_SECRET>&scope=light
  - type: cron
    name: the-pilot-sync-sah
    runtime: node
    region: frankfurt
    plan: starter
    schedule: '*/15 * * * *'
    buildCommand: 'echo no-build'
    startCommand: >-
      node -e "fetch(process.env.SYNC_URL).then(r=>r.text()).then(t=>{console.log(t);process.exit(0)}).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: SYNC_URL
        sync: false

  # --- Cron 2 : NOUVELLES souscriptions seulement, toutes les heures ---
  # Les souscriptions sont figées : on n'insère que les nouvelles (scope=subscriptions).
  # SYNC_URL_SUBS à renseigner dans le dashboard Render :
  #   https://<domaine-de-l-app>/api/cron/sah-sync?token=<CRON_SECRET>&scope=subscriptions
  - type: cron
    name: the-pilot-sync-subscriptions
    runtime: node
    region: frankfurt
    plan: starter
    schedule: '0 * * * *'
    buildCommand: 'echo no-build'
    startCommand: >-
      node -e "fetch(process.env.SYNC_URL_SUBS).then(r=>r.text()).then(t=>{console.log(t);process.exit(0)}).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: SYNC_URL_SUBS
        sync: false
